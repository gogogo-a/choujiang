<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古墓抽奖 - 最终结果</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="result">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M9 27V10l7-5 7 5v17"/><circle cx="16" cy="16" r="4"/></svg></span>
          <span>古墓抽奖</span>
        </div>
        <nav class="steps" aria-label="抽奖步骤">
          <span class="step active">1</span>
          <span class="step active">2</span>
          <span class="step active">3</span>
        </nav>
      </header>

      <section class="hero">
        <div>
          <p class="eyebrow">最终结果</p>
          <h1>本次抽奖结果已生成</h1>
        </div>
        <p class="lead" data-submit-status>正在提交结果并销毁密钥...</p>
        <div class="result-grid" data-result></div>
        <div class="actions">
          <button class="button" type="button" data-reset>重新开始</button>
          <a class="button secondary" href="index.html">返回首页</a>
        </div>
      </section>
    </main>
    <button class="button floating-reset" type="button" data-reset>重新开始</button>
    <script src="app.js"></script>
  </body>
</html>
