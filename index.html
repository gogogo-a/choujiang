<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古墓抽奖 - 选择道具</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="tool">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M9 27V10l7-5 7 5v17"/><path d="M6 27h20"/><path d="M12 13h8"/></svg></span>
          <span>古墓抽奖</span>
        </div>
        <nav class="steps" aria-label="抽奖步骤">
          <span class="step active">1</span>
          <span class="step">2</span>
          <span class="step">3</span>
        </nav>
      </header>

      <section class="hero">
        <div>
          <p class="eyebrow">第一步</p>
          <h1>先选一件入局道具</h1>
        </div>
        <!-- <p class="lead">输入老板给你的密钥，通过校验后再从五个选项里选一个。密钥提交最终结果后会自动销毁。</p> -->
        <form class="key-form" data-key-form>
          <label>
            <span>抽奖密钥</span>
            <input name="key" placeholder="输入后台生成的密钥" autocomplete="off">
          </label>
          <button class="button secondary" type="submit">验证密钥</button>
          <p class="form-message" data-key-message></p>
        </form>
        <div class="grid" data-tools></div>
        <div class="actions">
          <button class="button" type="button" data-next disabled>进入抽奖</button>
        </div>
      </section>
    </main>

    <button class="button floating-reset" type="button" data-reset>重新开始</button>

    <div class="modal" data-modal>
      <div class="modal-box">
        <h2 data-modal-title></h2>
        <p data-modal-message></p>
        <a class="button" href="#" data-modal-action>知道了</a>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
