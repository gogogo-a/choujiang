<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古墓抽奖 - 后台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="admin">
    <main class="shell admin-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"><svg viewBox="0 0 32 32" aria-hidden="true"><path d="M7 26V8h18v18"/><path d="M11 14h10"/><path d="M11 20h10"/></svg></span>
          <span>古墓抽奖后台</span>
        </div>
        <button class="button secondary" type="button" data-admin-logout>退出</button>
      </header>

      <section class="hero admin-login" data-admin-login>
        <div>
          <p class="eyebrow">后台登录</p>
          <h1>登录后生成老板密钥</h1>
        </div>
        <form class="admin-form" data-login-form>
          <label>
            <span>账号</span>
            <input name="username" autocomplete="username" value="admin">
          </label>
          <label>
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password" value="admin123456">
          </label>
          <button class="button" type="submit">登录后台</button>
          <p class="form-message" data-login-message></p>
        </form>
      </section>

      <section class="hero admin-dashboard" data-admin-dashboard hidden>
        <div>
          <p class="eyebrow">密钥管理</p>
          <h1>生成密钥并查看抽奖记录</h1>
        </div>
        <form class="admin-form inline-form" data-key-form>
          <label>
            <span>老板名称</span>
            <input name="boss" placeholder="例如：张老板">
          </label>
          <button class="button" type="submit">生成密钥</button>
        </form>
        <div class="copy-panel" data-new-key hidden>
          <p>新密钥</p>
          <strong data-new-key-text></strong>
          <button class="button secondary" type="button" data-copy-key>复制密钥</button>
        </div>

        <div class="admin-section">
          <h2>密钥列表</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>老板</th>
                  <th>密钥</th>
                  <th>状态</th>
                  <th>创建时间</th>
                  <th>使用时间</th>
                </tr>
              </thead>
              <tbody data-key-list></tbody>
            </table>
          </div>
        </div>

        <div class="admin-section">
          <h2>使用记录</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>老板</th>
                  <th>密钥</th>
                  <th>道具</th>
                  <th>图标</th>
                  <th>场景</th>
                  <th>使用时间</th>
                </tr>
              </thead>
              <tbody data-record-list></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
